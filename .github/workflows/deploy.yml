name: Kubernetes Workflow

on:
  push:
    branches: [ "main" ] # Se activa al subir cambios a la rama main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Kubernetes
        run: |
          # Aquí usamos tu secreto para autenticarnos
          echo "Configurando entorno con TOKEN_KUBERNETES..."
          # En un entorno real aquí configurarías el kubeconfig
          
      - name: Aplicar cambios (Página 19 del PDF)
        run: |
          kubectl apply -f deployment.yml
          kubectl apply -f service.yml

      - name: Verificación final (Página 20 del PDF)
        run: |
          kubectl get svc
          kubectl get pods
